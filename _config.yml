# Setup
title: Ziyang Wang
description: T-TrAt 的个人博客，分享一些技术笔记。
url: https://t-trat.github.io
avatar: /avatar.webp
paginate: 5
permalink: pretty
cover_image: /bg.webp

# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: xxxhz
  card: summary
logo: logo.png
social:
  name: Ziyang Wang
  links:
    - https://twitter.com/vszhub
    - https://github.com/t-trat
google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Ziyang Wang
  url: https://github.com/t-trat/
  email: wangziyang06@126.com
